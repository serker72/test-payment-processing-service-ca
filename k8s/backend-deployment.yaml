apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processing-backend
  namespace: payment-processing
  labels:
    app: payment-processing-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-processing-backend
  template:
    metadata:
      labels:
        app: payment-processing-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: payment-processing-backend-ca:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: payment-processing-config
            - secretRef:
                name: payment-processing-secret
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-processing-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-processing-secret
                  key: REDIS_PASSWORD
            - name: BACKEND_AUTHENTICATION_HEADER_VALUE
              valueFrom:
                secretKeyRef:
                  name: payment-processing-secret
                  key: BACKEND_AUTHENTICATION_HEADER_VALUE
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
