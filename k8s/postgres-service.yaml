apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: payment-processing
  labels:
    app: payment-processing
    component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: payment-processing
    component: postgres
