apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: payment-processing
  labels:
    app: payment-processing
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: payment-processing
  labels:
    app: payment-processing
    component: redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
  namespace: payment-processing
  labels:
    app: payment-processing
    component: rabbitmq
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
