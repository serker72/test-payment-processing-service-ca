apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processing-consumer
  namespace: payment-processing
  labels:
    app: payment-processing-consumer
    tier: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processing-consumer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: payment-processing-consumer
        tier: consumer
    spec:
      containers:
        - name: consumer
          image: payment-processing-backend-ca:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: payment-processing-config
            - secretRef:
                name: payment-processing-secret
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-processing-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-processing-secret
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f 'payments.py' || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
